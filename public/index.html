<!DOCTYPE html>
<html>
<head>
  <title>Cloud Browser</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100vw;
      height: 100vh;
      background: #000;
      overflow: hidden;
    }
    #screen {
      position: fixed;
      top: 0; left: 0;
      width: 100vw;
      height: 100vh;
      touch-action: none;
    }
    #toolbar {
      position: fixed;
      top: -60px;
      left: 0;
      width: 100%;
      background: rgba(20,20,20,0.97);
      padding: 8px;
      display: flex;
      gap: 6px;
      align-items: center;
      z-index: 999;
      transition: top 0.25s ease;
      height: 52px;
    }
    #toolbar.show { top: 0; }
    #urlbar {
      flex: 1; padding: 6px 12px;
      border-radius: 20px; border: none;
      background: #333; color: white; font-size: 14px;
    }
    #goBtn {
      padding: 6px 14px; border-radius: 20px;
      background: #4CAF50; color: white;
      border: none; font-size: 13px; cursor: pointer;
    }
    #closeBar {
      padding: 6px 10px; border-radius: 20px;
      background: #555; color: white;
      border: none; font-size: 13px; cursor: pointer;
    }
    #status {
      position: fixed;
      bottom: 6px; left: 0;
      width: 100%;
      text-align: center;
      color: rgba(255,255,255,0.25);
      font-size: 9px;
      z-index: 998;
      pointer-events: none;
      font-family: monospace;
    }
    #hiddenInput {
      position: fixed;
      left: 50%; top: 50%;
      width: 1px; height: 1px;
      opacity: 0; font-size: 16px;
      border: none; background: transparent;
      color: transparent; caret-color: transparent;
      transform: translate(-50%,-50%);
    }
  </style>
</head>
<body>
  <canvas id="screen"></canvas>

  <div id="toolbar">
    <input id="urlbar" type="text" value="https://google.com" />
    <button id="goBtn">Go</button>
    <button id="closeBar">✕</button>
  </div>

  <div id="status">Loading...</div>

  <input id="hiddenInput" type="text"
    autocomplete="off" autocorrect="off"
    autocapitalize="off" spellcheck="false" />

  <script>
    const canvas = document.getElementById('screen')
    const ctx = canvas.getContext('2d')
    const status = document.getElementById('status')
    const urlbar = document.getElementById('urlbar')
    const toolbar = document.getElementById('toolbar')
    const hiddenInput = document.getElementById('hiddenInput')

    canvas.width = 720
    canvas.height = 1560

    let ws = null
    let sessionId = null

    // Connect WebSocket
    function connectWS() {
      const proto = location.protocol === 'https:' ? 'wss:' : 'ws:'
      ws = new WebSocket(`${proto}//${location.host}`)
      ws.binaryType = 'arraybuffer'

      ws.onopen = () => {
        status.textContent = ''
        if (sessionId) ws.send(JSON.stringify({ type: 'join', sessionId }))
      }

      ws.onmessage = (e) => {
        // Binary = frame
        if (e.data instanceof ArrayBuffer) {
          const blob = new Blob([e.data], { type: 'image/jpeg' })
          const url = URL.createObjectURL(blob)
          const img = new Image()
          img.onload = () => {
            if (canvas.width !== img.naturalWidth) canvas.width = img.naturalWidth
            if (canvas.height !== img.naturalHeight) canvas.height = img.naturalHeight
            ctx.drawImage(img, 0, 0)
            URL.revokeObjectURL(url)
          }
          img.src = url
          return
        }
        // Text = JSON message
        try {
          const msg = JSON.parse(e.data)
          if (msg.type === 'url') urlbar.value = msg.url
          if (msg.type === 'error') status.textContent = 'Error: ' + msg.msg
        } catch (e) {}
      }

      ws.onclose = () => {
        status.textContent = 'Reconnecting...'
        setTimeout(connectWS, 1000)
      }
    }

    async function startSession(url) {
      status.textContent = 'Starting...'
      try {
        const res = await fetch('/api/session', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ url: url || 'https://google.com' })
        })
        const data = await res.json()
        if (data.error) { status.textContent = 'Error: ' + data.error; return }
        sessionId = data.sessionId
        connectWS()
      } catch (err) {
        status.textContent = 'Failed: ' + err.message
      }
    }

    function toCanvas(clientX, clientY) {
      const rect = canvas.getBoundingClientRect()
      return {
        x: (clientX - rect.left) / rect.width * canvas.width,
        y: (clientY - rect.top) / rect.height * canvas.height
      }
    }

    function send(obj) {
      if (ws && ws.readyState === WebSocket.OPEN) {
        ws.send(JSON.stringify(obj))
      }
    }

    // Touch
    let t0x, t0y, t0time, lastTY, didScroll, swipeStartY

    canvas.addEventListener('touchstart', (e) => {
      e.preventDefault()
      const t = e.touches[0]
      t0x = t.clientX
      t0y = t.clientY
      lastTY = t.clientY
      swipeStartY = t.clientY
      t0time = Date.now()
      didScroll = false
    }, { passive: false })

    canvas.addEventListener('touchmove', (e) => {
      e.preventDefault()
      const t = e.touches[0]

      if (swipeStartY < 40 && t.clientY - swipeStartY > 50) {
        toolbar.classList.add('show')
        return
      }

      didScroll = true
      const delta = (lastTY - t.clientY) * 3
      lastTY = t.clientY
      send({ type: 'scroll', delta })
    }, { passive: false })

    canvas.addEventListener('touchend', (e) => {
      e.preventDefault()
      if (didScroll) return

      const t = e.changedTouches[0]
      const dx = Math.abs(t.clientX - t0x)
      const dy = Math.abs(t.clientY - t0y)
      const dt = Date.now() - t0time

      if (dt < 300 && dx < 20 && dy < 20) {
        const { x, y } = toCanvas(t0x, t0y)
        send({ type: 'tap', x, y })
        hiddenInput.removeAttribute('readonly')
        hiddenInput.focus()
      }
    }, { passive: false })

    // Desktop
    canvas.addEventListener('click', (e) => {
      if (navigator.maxTouchPoints > 0) return
      const { x, y } = toCanvas(e.clientX, e.clientY)
      send({ type: 'tap', x, y })
      hiddenInput.focus()
    })

    canvas.addEventListener('wheel', (e) => {
      e.preventDefault()
      send({ type: 'scroll', delta: e.deltaY })
    }, { passive: false })

    // Keyboard
    let lastVal = ''
    hiddenInput.addEventListener('input', () => {
      const val = hiddenInput.value
      if (val.length > lastVal.length) {
        send({ type: 'type', text: val.slice(lastVal.length) })
      }
      lastVal = val
      if (hiddenInput.value.length > 20) {
        hiddenInput.value = ''
        lastVal = ''
      }
    })

    hiddenInput.addEventListener('keydown', (e) => {
      if (e.key === 'Backspace') {
        send({ type: 'key', key: 'Backspace' })
        lastVal = hiddenInput.value.slice(0, -1)
      }
      if (e.key === 'Enter') {
        send({ type: 'key', key: 'Enter' })
        hiddenInput.value = ''
        lastVal = ''
      }
    })

    document.addEventListener('keydown', (e) => {
      if (e.target === urlbar || e.target === hiddenInput) return
      if (e.key.length === 1) send({ type: 'type', text: e.key })
      else send({ type: 'key', key: e.key })
    })

    // Toolbar
    document.getElementById('goBtn').addEventListener('click', () => {
      toolbar.classList.remove('show')
      send({ type: 'navigate', url: urlbar.value })
    })

    document.getElementById('closeBar').addEventListener('click', () => {
      toolbar.classList.remove('show')
    })

    urlbar.addEventListener('keydown', (e) => {
      if (e.key !== 'Enter') return
      toolbar.classList.remove('show')
      send({ type: 'navigate', url: urlbar.value })
    })

    startSession('https://google.com')
  </script>
</body>
</html>
