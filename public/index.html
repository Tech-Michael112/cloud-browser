<!-- public/index.html -->
<!DOCTYPE html>
<html>
<head>
  <title>Cloud Browser</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #111; display: flex; 
           flex-direction: column; align-items: center; }
    #toolbar {
      width: 100%; background: #222; padding: 8px;
      display: flex; gap: 8px;
    }
    #urlbar {
      flex: 1; padding: 6px 10px; border-radius: 20px;
      border: none; background: #333; color: white;
    }
    #goBtn {
      padding: 6px 16px; border-radius: 20px;
      background: #4CAF50; color: white; border: none;
      cursor: pointer;
    }
    #screen {
      width: 390px;
      height: 844px;
      cursor: pointer;
    }
    #status {
      color: #888; font-size: 12px; padding: 4px;
      font-family: monospace;
    }
  </style>
</head>
<body>

  <div id="toolbar">
    <input id="urlbar" type="text" placeholder="Enter URL..." />
    <button id="goBtn">Go</button>
  </div>
  <div id="status">Connecting...</div>
  <canvas id="screen" width="390" height="844"></canvas>

  <script src="/socket.io/socket.io.js"></script>
  <script>
    const canvas = document.getElementById('screen')
    const ctx = canvas.getContext('2d')
    const urlbar = document.getElementById('urlbar')
    const status = document.getElementById('status')
    const socket = io()

    // Detect device profile
    const profile = {
      userAgent: navigator.userAgent,
      width: 390,
      height: 844,
      dpr: window.devicePixelRatio || 3,
      touch: navigator.maxTouchPoints > 0,
      url: 'https://google.com'
    }

    // Start session
    async function startSession() {
      status.textContent = 'Starting session...'

      const res = await fetch('/api/session', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(profile)
      })

      const { sessionId } = await res.json()
      status.textContent = 'Session started: ' + sessionId

      // Join the session via socket
      socket.emit('join', sessionId)
    }

    // Render incoming frames
    socket.on('frame', (base64) => {
      const img = new Image()
      img.onload = () => ctx.drawImage(img, 0, 0, canvas.width, canvas.height)
      img.src = 'data:image/jpeg;base64,' + base64
    })

    // Update URL bar
    socket.on('url', (url) => {
      urlbar.value = url
      status.textContent = 'Live: ' + url
    })

    // Send click input
    canvas.addEventListener('click', (e) => {
      const rect = canvas.getBoundingClientRect()
      socket.emit('input', {
        type: 'click',
        x: e.clientX - rect.left,
        y: e.clientY - rect.top
      })
    })

    // Send touch input
    canvas.addEventListener('touchstart', (e) => {
      e.preventDefault()
      const rect = canvas.getBoundingClientRect()
      socket.emit('input', {
        type: 'touchstart',
        x: e.touches[0].clientX - rect.left,
        y: e.touches[0].clientY - rect.top
      })
    })

    // Send scroll
    canvas.addEventListener('wheel', (e) => {
      socket.emit('input', { type: 'scroll', delta: e.deltaY })
    })

    // Navigate to URL
    document.getElementById('goBtn').addEventListener('click', () => {
      socket.emit('input', { type: 'navigate', url: urlbar.value })
    })

    urlbar.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') {
        socket.emit('input', { type: 'navigate', url: urlbar.value })
      }
    })

    startSession()
  </script>
</body>
</html>
