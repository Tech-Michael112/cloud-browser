<!DOCTYPE html>
<html>
<head>
  <title>Cloud Browser</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #111; display: flex; flex-direction: column; align-items: center; }
    #toolbar {
      width: 100%; background: #222; padding: 8px;
      display: flex; gap: 8px;
    }
    #urlbar {
      flex: 1; padding: 6px 10px; border-radius: 20px;
      border: none; background: #333; color: white; font-size: 14px;
    }
    #goBtn {
      padding: 6px 16px; border-radius: 20px;
      background: #4CAF50; color: white; border: none; cursor: pointer;
    }
    #status {
      color: #888; font-size: 12px; padding: 4px;
      font-family: monospace; width: 100%; text-align: center;
    }
    #wrapper {
      width: 100%;
      overflow: auto;
      display: flex;
      justify-content: center;
    }
    #screen {
      display: block;
      cursor: pointer;
      background: #000;
      max-width: 100%;
    }
  </style>
</head>
<body>
  <div id="toolbar">
    <input id="urlbar" type="text" value="https://google.com" />
    <button id="goBtn">Go</button>
  </div>
  <div id="status">Starting...</div>
  <div id="wrapper">
    <canvas id="screen"></canvas>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script>
    const canvas = document.getElementById('screen')
    const ctx = canvas.getContext('2d')
    const urlbar = document.getElementById('urlbar')
    const status = document.getElementById('status')
    const socket = io()

    let sessionId = null

    async function startSession(url) {
      status.textContent = 'Starting session...'
      try {
        const res = await fetch('/api/session', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            userAgent: navigator.userAgent,
            width: 390,
            height: 844,
            dpr: window.devicePixelRatio || 3,
            touch: navigator.maxTouchPoints > 0,
            url: url || 'https://google.com'
          })
        })

        const data = await res.json()

        if (data.error) {
          status.textContent = 'Error: ' + data.error
          return
        }

        sessionId = data.sessionId
        status.textContent = 'Session ready!'
        socket.emit('join', sessionId)

      } catch (err) {
        status.textContent = 'Failed: ' + err.message
      }
    }

    // Render frames — fix blur by using natural image size
    socket.on('frame', (base64) => {
      const img = new Image()
      img.onload = () => {
        if (canvas.width !== img.naturalWidth) {
          canvas.width = img.naturalWidth
          canvas.height = img.naturalHeight
        }
        ctx.drawImage(img, 0, 0)
      }
      img.src = 'data:image/jpeg;base64,' + base64
    })

    // Update URL bar
    socket.on('url', (url) => {
      urlbar.value = url
      status.textContent = url
    })

    // Error
    socket.on('error', (msg) => {
      status.textContent = 'Error: ' + msg
    })

    // Click — scale coordinates to match canvas real size
    canvas.addEventListener('click', (e) => {
      const rect = canvas.getBoundingClientRect()
      const scaleX = canvas.width / rect.width
      const scaleY = canvas.height / rect.height
      socket.emit('input', {
        type: 'click',
        x: (e.clientX - rect.left) * scaleX,
        y: (e.clientY - rect.top) * scaleY
      })
    })

    // Touch — scale coordinates
    canvas.addEventListener('touchstart', (e) => {
      e.preventDefault()
      const rect = canvas.getBoundingClientRect()
      const scaleX = canvas.width / rect.width
      const scaleY = canvas.height / rect.height
      socket.emit('input', {
        type: 'touchstart',
        x: (e.touches[0].clientX - rect.left) * scaleX,
        y: (e.touches[0].clientY - rect.top) * scaleY
      })
    }, { passive: false })

    // Scroll
    canvas.addEventListener('wheel', (e) => {
      socket.emit('input', { type: 'scroll', delta: e.deltaY })
    })

    // Go button
    document.getElementById('goBtn').addEventListener('click', () => {
      if (sessionId) {
        socket.emit('input', { type: 'navigate', url: urlbar.value })
      } else {
        startSession(urlbar.value)
      }
    })

    // Enter key
    urlbar.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') {
        if (sessionId) {
          socket.emit('input', { type: 'navigate', url: urlbar.value })
        } else {
          startSession(urlbar.value)
        }
      }
    })

    // Auto start
    startSession('https://google.com')
  </script>
</body>
</html>
