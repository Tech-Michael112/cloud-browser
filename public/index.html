<!DOCTYPE html>
<html>
<head>
  <title>Cloud Browser</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100vw;
      height: 100vh;
      background: #000;
      overflow: hidden;
    }
    #screen {
      position: fixed;
      top: 0; left: 0;
      width: 100vw;
      height: 100vh;
      touch-action: none;
    }
    /* Floating URL bar - hidden by default, shows on swipe down */
    #toolbar {
      position: fixed;
      top: -60px;
      left: 0;
      width: 100%;
      background: rgba(20,20,20,0.95);
      padding: 8px;
      display: flex;
      gap: 6px;
      align-items: center;
      z-index: 999;
      transition: top 0.3s ease;
      height: 52px;
    }
    #toolbar.show { top: 0; }
    #urlbar {
      flex: 1; padding: 6px 12px;
      border-radius: 20px; border: none;
      background: #333; color: white; font-size: 14px;
    }
    #goBtn {
      padding: 6px 14px; border-radius: 20px;
      background: #4CAF50; color: white;
      border: none; font-size: 13px; cursor: pointer;
    }
    #closeBar {
      padding: 6px 10px; border-radius: 20px;
      background: #555; color: white;
      border: none; font-size: 13px; cursor: pointer;
    }
    #status {
      position: fixed;
      bottom: 4px;
      left: 0;
      width: 100%;
      text-align: center;
      color: rgba(255,255,255,0.3);
      font-size: 9px;
      z-index: 998;
      pointer-events: none;
    }
    /* Invisible input to capture keyboard */
    #hiddenInput {
      position: fixed;
      left: 50%;
      top: 50%;
      width: 1px;
      height: 1px;
      opacity: 0;
      font-size: 16px;
      border: none;
      background: transparent;
      color: transparent;
      caret-color: transparent;
      transform: translate(-50%, -50%);
    }
  </style>
</head>
<body>
  <canvas id="screen"></canvas>

  <div id="toolbar">
    <input id="urlbar" type="text" value="https://accounts.google.com" />
    <button id="goBtn">Go</button>
    <button id="closeBar">✕</button>
  </div>

  <div id="status">Swipe down to show URL bar</div>

  <input id="hiddenInput" type="text"
    autocomplete="off" autocorrect="off"
    autocapitalize="off" spellcheck="false" />

  <script src="/socket.io/socket.io.js"></script>
  <script>
    const canvas = document.getElementById('screen')
    const ctx = canvas.getContext('2d')
    const status = document.getElementById('status')
    const urlbar = document.getElementById('urlbar')
    const toolbar = document.getElementById('toolbar')
    const hiddenInput = document.getElementById('hiddenInput')
    const socket = io()

    canvas.width = 720
    canvas.height = 1560

    let sessionId = null

    async function startSession(url) {
      status.textContent = 'Starting...'
      try {
        const res = await fetch('/api/session', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ url: url || 'https://accounts.google.com' })
        })
        const data = await res.json()
        if (data.error) { status.textContent = 'Error: ' + data.error; return }
        sessionId = data.sessionId
        status.textContent = ''
        socket.emit('join', sessionId)
      } catch (err) {
        status.textContent = 'Failed: ' + err.message
      }
    }

    // Render frames
    socket.on('frame', (base64) => {
      const img = new Image()
      img.onload = () => {
        if (canvas.width !== img.naturalWidth) canvas.width = img.naturalWidth
        if (canvas.height !== img.naturalHeight) canvas.height = img.naturalHeight
        ctx.drawImage(img, 0, 0)
      }
      img.src = 'data:image/jpeg;base64,' + base64
    })

    socket.on('url', (url) => { urlbar.value = url })
    socket.on('error', (msg) => { status.textContent = 'Error: ' + msg })

    function toCanvas(clientX, clientY) {
      const rect = canvas.getBoundingClientRect()
      return {
        x: (clientX - rect.left) / rect.width * canvas.width,
        y: (clientY - rect.top) / rect.height * canvas.height
      }
    }

    // Touch handling
    let t0x, t0y, t0time, lastTY, didScroll, swipeStartY

    canvas.addEventListener('touchstart', (e) => {
      e.preventDefault()
      const t = e.touches[0]
      t0x = t.clientX
      t0y = t.clientY
      lastTY = t.clientY
      swipeStartY = t.clientY
      t0time = Date.now()
      didScroll = false
    }, { passive: false })

    canvas.addEventListener('touchmove', (e) => {
      e.preventDefault()
      const t = e.touches[0]
      const delta = (lastTY - t.clientY) * 3
      lastTY = t.clientY

      // Detect swipe down from top to show toolbar
      if (swipeStartY < 30 && t.clientY - swipeStartY > 40) {
        toolbar.classList.add('show')
        return
      }

      didScroll = true
      socket.emit('input', { type: 'scroll', delta })
    }, { passive: false })

    canvas.addEventListener('touchend', (e) => {
      e.preventDefault()
      if (didScroll) return

      const t = e.changedTouches[0]
      const dx = Math.abs(t.clientX - t0x)
      const dy = Math.abs(t.clientY - t0y)
      const dt = Date.now() - t0time

      if (dt < 300 && dx < 20 && dy < 20) {
        const { x, y } = toCanvas(t0x, t0y)
        socket.emit('input', { type: 'tap', x, y })

        // Focus hidden input to bring up keyboard
        hiddenInput.removeAttribute('readonly')
        hiddenInput.focus()
      }
    }, { passive: false })

    // Desktop
    canvas.addEventListener('click', (e) => {
      if (navigator.maxTouchPoints > 0) return
      const { x, y } = toCanvas(e.clientX, e.clientY)
      socket.emit('input', { type: 'tap', x, y })
      hiddenInput.focus()
    })

    canvas.addEventListener('wheel', (e) => {
      e.preventDefault()
      socket.emit('input', { type: 'scroll', delta: e.deltaY })
    }, { passive: false })

    // Capture keyboard from hidden input
    let lastVal = ''
    hiddenInput.addEventListener('input', () => {
      const val = hiddenInput.value
      if (val.length > lastVal.length) {
        socket.emit('input', { type: 'type', text: val.slice(lastVal.length) })
      }
      lastVal = val
      // Keep value short to avoid issues
      if (hiddenInput.value.length > 20) {
        hiddenInput.value = ''
        lastVal = ''
      }
    })

    hiddenInput.addEventListener('keydown', (e) => {
      if (e.key === 'Backspace') {
        socket.emit('input', { type: 'key', key: 'Backspace' })
        lastVal = hiddenInput.value.slice(0, -1)
      }
      if (e.key === 'Enter') {
        socket.emit('input', { type: 'key', key: 'Enter' })
        hiddenInput.value = ''
        lastVal = ''
      }
    })

    // Desktop keyboard
    document.addEventListener('keydown', (e) => {
      if (e.target === urlbar || e.target === hiddenInput) return
      if (e.key.length === 1) socket.emit('input', { type: 'type', text: e.key })
      else socket.emit('input', { type: 'key', key: e.key })
    })

    // Toolbar controls
    document.getElementById('goBtn').addEventListener('click', () => {
      toolbar.classList.remove('show')
      if (sessionId) socket.emit('input', { type: 'navigate', url: urlbar.value })
      else startSession(urlbar.value)
    })

    document.getElementById('closeBar').addEventListener('click', () => {
      toolbar.classList.remove('show')
    })

    urlbar.addEventListener('keydown', (e) => {
      if (e.key !== 'Enter') return
      toolbar.classList.remove('show')
      if (sessionId) socket.emit('input', { type: 'navigate', url: urlbar.value })
      else startSession(urlbar.value)
    })

    startSession('https://accounts.google.com')
  </script>
</body>
</html>
